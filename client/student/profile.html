<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile — LMS Student</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/dashboard.css" />
</head>
<body>
<div class="layout">

  <aside class="sidebar" id="sidebar">
    <a class="sidebar-logo" href="/student/dashboard.html">
      <span class="logo-icon">📚</span>
      <span class="logo-text">LibraryMS <small>Student Portal</small></span>
    </a>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-title">My Library</div>
        <a class="nav-item" href="/student/dashboard.html"><span class="nav-icon">🏠</span> Dashboard</a>
        <a class="nav-item active" href="/student/profile.html"><span class="nav-icon">👤</span> My Profile</a>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="sidebar-avatar">S</div>
        <div class="sidebar-user-info">
          <div class="user-name" id="sidebar-user-name">Student</div>
          <div class="user-role" id="sidebar-user-role">student</div>
        </div>
      </div>
      <button class="btn-logout" onclick="logout()">🚪 Logout</button>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle" id="menu-toggle">☰</button>
        <div>
          <div class="topbar-title">My Profile</div>
          <div class="topbar-subtitle">View and update your information</div>
        </div>
      </div>
      <div class="topbar-right">
        <div class="topbar-date" id="topbar-date"></div>
        <span>🎓 <span id="topbar-user-name"></span></span>
      </div>
    </div>

    <div class="content">
      <div style="display:grid;grid-template-columns:1fr 1.2fr;gap:1.5rem;align-items:start;" id="profile-grid">

        <!-- Profile Info Card -->
        <div class="section-card">
          <div class="section-header"><h3>👤 Profile Information</h3></div>
          <div class="section-body" id="profile-info-body">
            <div class="text-center text-muted" style="padding:2rem;">Loading...</div>
          </div>
        </div>

        <!-- Update Profile Form -->
        <div class="section-card">
          <div class="section-header"><h3>✏️ Update Profile</h3></div>
          <div class="section-body">
            <div id="profile-alert" class="auth-alert" style="display:none;margin-bottom:1rem;"></div>
            <form id="profile-form" novalidate>
              <div class="form-group">
                <label class="form-label" for="p-name">Full Name</label>
                <input id="p-name" type="text" class="form-control" placeholder="Full name" />
              </div>
              <div class="form-group">
                <label class="form-label" for="p-email">Email</label>
                <input id="p-email" type="email" class="form-control" placeholder="Email address" />
              </div>
              <div class="form-group">
                <label class="form-label" for="p-mobile">Mobile Number</label>
                <input id="p-mobile" type="tel" class="form-control" placeholder="10-digit mobile" maxlength="10" />
              </div>
              <div class="form-group">
                <label class="form-label" for="p-dept">Department</label>
                <input id="p-dept" type="text" class="form-control" placeholder="Department" />
              </div>
              <div class="form-group">
                <label class="form-label" for="p-year">Year</label>
                <select id="p-year" class="form-control">
                  <option value="">Select Year</option>
                  <option value="1st Year">1st Year</option>
                  <option value="2nd Year">2nd Year</option>
                  <option value="3rd Year">3rd Year</option>
                  <option value="4th Year">4th Year</option>
                </select>
              </div>
              <button type="submit" class="btn btn-primary btn-block" id="btn-update-profile">
                Save Changes
              </button>
            </form>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<style>
  @media (max-width:900px) { #profile-grid { grid-template-columns: 1fr !important; } }
  .auth-alert { padding:.65rem 1rem; border-radius:6px; font-size:.85rem; border-left:4px solid; }
  .auth-alert.error { background:#fee2e2; color:#b91c1c; border-color:#ef4444; display:block !important; }
  .auth-alert.success { background:#dcfce7; color:#166534; border-color:#10b981; display:block !important; }
</style>

<script src="/js/api.js"></script>
<script src="/js/student/profile.js"></script>
</body>
</html>
