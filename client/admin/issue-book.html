<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Issue Book — LMS Admin</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/dashboard.css" />
</head>
<body>
<div class="layout">

  <aside class="sidebar" id="sidebar">
    <a class="sidebar-logo" href="/admin/dashboard.html">
      <span class="logo-icon">📚</span>
      <span class="logo-text">LibraryMS <small>Admin Panel</small></span>
    </a>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-title">Main</div>
        <a class="nav-item" href="/admin/dashboard.html"><span class="nav-icon">🏠</span> Dashboard</a>
      </div>
      <div class="nav-section">
        <div class="nav-section-title">Library</div>
        <a class="nav-item" href="/admin/books.html"><span class="nav-icon">📖</span> Books</a>
        <a class="nav-item active" href="/admin/issue-book.html"><span class="nav-icon">📤</span> Issue Book</a>
        <a class="nav-item" href="/admin/return-book.html"><span class="nav-icon">📥</span> Return Book</a>
      </div>
      <div class="nav-section">
        <div class="nav-section-title">Students</div>
        <a class="nav-item" href="/admin/students.html"><span class="nav-icon">👨‍🎓</span> Students</a>
        <a class="nav-item" href="/admin/fines.html"><span class="nav-icon">💰</span> Fines</a>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="sidebar-avatar">A</div>
        <div class="sidebar-user-info">
          <div class="user-name" id="sidebar-user-name">Admin</div>
          <div class="user-role" id="sidebar-user-role">admin</div>
        </div>
      </div>
      <button class="btn-logout" onclick="logout()">🚪 Logout</button>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle" id="menu-toggle">☰</button>
        <div>
          <div class="topbar-title">Issue Book</div>
          <div class="topbar-subtitle">Issue a book to a student</div>
        </div>
      </div>
      <div class="topbar-right">
        <div class="topbar-date" id="topbar-date"></div>
        <span>👤 <span id="topbar-user-name"></span></span>
      </div>
    </div>

    <div class="content">
      <div style="display:grid;grid-template-columns:1fr 1.4fr;gap:1.5rem;align-items:start;" id="issue-grid">

        <!-- Issue Form -->
        <div class="section-card">
          <div class="section-header"><h3>📤 Issue a Book</h3></div>
          <div class="section-body">
            <div id="issue-alert" class="auth-alert" style="display:none;margin-bottom:1rem;"></div>
            <form id="issue-form" novalidate>
              <div class="form-group">
                <label class="form-label">Select Student <span class="required">*</span></label>
                <select id="f-student" class="form-control" required>
                  <option value="">Loading students...</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Select Book <span class="required">*</span></label>
                <select id="f-book" class="form-control" required>
                  <option value="">Loading books...</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Issue Date <span class="required">*</span></label>
                <input id="f-issue-date" type="date" class="form-control" required />
              </div>
              <div class="form-group">
                <label class="form-label">Due Date <span class="required">*</span></label>
                <input id="f-due-date" type="date" class="form-control" required />
              </div>
              <button type="submit" class="btn btn-primary btn-block" id="btn-issue">Issue Book</button>
            </form>
          </div>
        </div>

        <!-- Currently Issued Books -->
        <div class="section-card">
          <div class="section-header">
            <h3>📋 Currently Issued</h3>
            <select id="filter-status" class="form-control" style="width:130px;">
              <option value="issued">Issued</option>
              <option value="overdue">Overdue</option>
              <option value="">All</option>
            </select>
          </div>
          <div class="table-wrapper" style="box-shadow:none;">
            <table>
              <thead>
                <tr>
                  <th>Student</th>
                  <th>Book</th>
                  <th>Due Date</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="issued-table-body">
                <tr><td colspan="4" class="text-center" style="padding:1.5rem;">Loading...</td></tr>
              </tbody>
            </table>
          </div>
          <div class="pagination" id="issued-pagination"></div>
        </div>

      </div>
    </div>
  </div>
</div>

<style>
  @media (max-width:900px) { #issue-grid { grid-template-columns: 1fr !important; } }
  .auth-alert { padding:.7rem 1rem; border-radius:6px; font-size:.85rem; border-left:4px solid; }
  .auth-alert.error { background:#fee2e2; color:#b91c1c; border-color:#ef4444; display:block !important; }
  .auth-alert.success { background:#dcfce7; color:#166534; border-color:#10b981; display:block !important; }
</style>

<script src="/js/api.js"></script>
<script src="/js/admin/issue.js"></script>
</body>
</html>
