<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Registration — Library Management System</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/auth.css" />
</head>
<body>

<div class="register-page">
  <div class="register-card">

    <!-- Header -->
    <div class="register-header">
      <div class="logo">📚</div>
      <h2>Student Registration</h2>
      <p>Create your library account to get started</p>
    </div>

    <!-- Alert Banner -->
    <div id="register-alert" class="auth-alert"></div>

    <!-- Registration Form -->
    <form id="register-form" novalidate>
      <div class="form-grid">

        <!-- Full Name -->
        <div class="form-group">
          <label class="form-label" for="reg-name">
            Full Name <span class="required">*</span>
          </label>
          <input id="reg-name" type="text" class="form-control" placeholder="Enter full name" required />
        </div>

        <!-- UID -->
        <div class="form-group">
          <label class="form-label" for="reg-uid">
            UID <span class="required">*</span>
          </label>
          <input id="reg-uid" type="text" class="form-control" placeholder="University ID" required />
        </div>

        <!-- Register Number -->
        <div class="form-group">
          <label class="form-label" for="reg-register">
            Register Number <span class="required">*</span>
          </label>
          <input id="reg-register" type="text" class="form-control" placeholder="e.g. 21IT001" required />
        </div>

        <!-- Department -->
        <div class="form-group">
          <label class="form-label" for="reg-dept">
            Department <span class="required">*</span>
          </label>
          <input id="reg-dept" type="text" class="form-control" placeholder="e.g. Computer Science" required />
        </div>

        <!-- Year -->
        <div class="form-group">
          <label class="form-label" for="reg-year">
            Year <span class="required">*</span>
          </label>
          <select id="reg-year" class="form-control" required>
            <option value="">Select Year</option>
            <option value="1st Year">1st Year</option>
            <option value="2nd Year">2nd Year</option>
            <option value="3rd Year">3rd Year</option>
            <option value="4th Year">4th Year</option>
          </select>
        </div>

        <!-- Mobile -->
        <div class="form-group">
          <label class="form-label" for="reg-mobile">
            Mobile Number <span class="required">*</span>
          </label>
          <input id="reg-mobile" type="tel" class="form-control" placeholder="10-digit mobile" maxlength="10" required />
        </div>

        <!-- Email -->
        <div class="form-group full">
          <label class="form-label" for="reg-email">
            Email Address <span class="required">*</span>
          </label>
          <input id="reg-email" type="email" class="form-control" placeholder="you@example.com" required />
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label" for="reg-password">
            Password <span class="required">*</span>
          </label>
          <input id="reg-password" type="password" class="form-control" placeholder="Min. 6 characters" required />
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
          <label class="form-label" for="reg-confirm">
            Confirm Password <span class="required">*</span>
          </label>
          <input id="reg-confirm" type="password" class="form-control" placeholder="Repeat password" required />
        </div>

        <!-- Submit -->
        <div class="form-group full">
          <button type="submit" class="auth-submit-btn">
            Create Account
          </button>
        </div>

      </div><!-- /form-grid -->
    </form>

    <!-- Back to login -->
    <div class="auth-link">
      Already have an account? <a href="/login.html">Login here</a>
    </div>

  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>
